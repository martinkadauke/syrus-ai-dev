name: Sync desktop app

# Pulls the latest macOS .dmg from the PRIVATE tkadauke/syrus releases onto the
# VM so the public site can serve it (the private repo can't be linked directly).
# Runs hourly + on demand, on the same self-hosted runner as deploys. Idempotent:
# it skips the 100 MB+ download when the current asset is already present.
#
# Requires repo secret SYRUS_RELEASE_TOKEN = a token with read access to
# tkadauke/syrus (classic PAT with `repo` scope, since fine-grained PATs can't
# target another user's personal repo). Until the secret exists, the sync step
# SKIPS cleanly (green run, no hourly failure notifications) — it starts working
# automatically the moment the secret is added.

on:
  schedule:
    - cron: "23 * * * *"
  workflow_dispatch:

concurrency:
  group: sync-desktop
  cancel-in-progress: false

jobs:
  sync:
    runs-on: [self-hosted, syrus]
    timeout-minutes: 15
    env:
      TOKEN: ${{ secrets.SYRUS_RELEASE_TOKEN }}
    steps:
      - name: Note when the token is missing
        if: ${{ env.TOKEN == '' }}
        run: echo "::notice::SYRUS_RELEASE_TOKEN is not set — skipping the sync. Add the secret to enable hourly auto-updates."

      - name: Sync latest .dmg
        if: ${{ env.TOKEN != '' }}
        env:
          SRC_REPO: tkadauke/syrus
          DEST: ${{ vars.DOWNLOADS_DIR || '/srv/syrus/downloads' }}
        run: |
          set -euo pipefail
          command -v jq >/dev/null || { echo "::error::jq is not installed on the runner."; exit 1; }
          mkdir -p "${DEST}"
          API="https://api.github.com/repos/${SRC_REPO}"

          rel=$(curl -fsSL -H "Authorization: Bearer ${TOKEN}" -H "Accept: application/vnd.github+json" \
                -H "X-GitHub-Api-Version: 2022-11-28" "${API}/releases/latest")
          tag=$(echo "$rel" | jq -r '.tag_name')
          asset_name=$(echo "$rel" | jq -r '[.assets[] | select(.name | test("arm64\\.dmg$"))][0].name')
          asset_url=$(echo "$rel"  | jq -r '[.assets[] | select(.name | test("arm64\\.dmg$"))][0].url')
          if [ -z "$asset_name" ] || [ "$asset_name" = "null" ]; then
            echo "::error::No arm64 .dmg asset in ${SRC_REPO} ${tag}"; exit 1
          fi
          echo "latest release: ${tag} -> ${asset_name}"

          current=$(cat "${DEST}/CURRENT" 2>/dev/null || echo "")
          if [ "$current" = "$asset_name" ] && [ -f "${DEST}/${asset_name}" ]; then
            echo "::notice::Already up to date (${asset_name})."
            exit 0
          fi

          tmp=$(mktemp -d)
          echo "downloading ${asset_name} ..."
          curl -fSL -H "Authorization: Bearer ${TOKEN}" -H "Accept: application/octet-stream" \
            "$asset_url" -o "${tmp}/${asset_name}"

          sz=$(stat -c%s "${tmp}/${asset_name}")
          if [ "$sz" -lt 1000000 ]; then
            echo "::error::downloaded file too small (${sz} bytes)"; head -c 300 "${tmp}/${asset_name}"; exit 1
          fi

          mv -f "${tmp}/${asset_name}" "${DEST}/${asset_name}"
          chmod 644 "${DEST}/${asset_name}"
          echo "${asset_name}" > "${DEST}/CURRENT"
          find "${DEST}" -maxdepth 1 -name "*.dmg" ! -name "${asset_name}" -delete || true
          rm -rf "${tmp}"
          echo "::notice::Synced ${asset_name} (${sz} bytes) to ${DEST}."
