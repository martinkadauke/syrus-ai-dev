# Single-service compose stack, deployed by .github/workflows/cicd.yml from the
# self-hosted runner on the Unraid VM. TLS + routing for syrus-ai.dev is handled
# externally by Nginx Proxy Manager, which proxies to http://<vm-ip>:${PUBLIC_PORT}.
#
# The image already bakes GIT_SHA / GIT_REF as env (from the Docker build args),
# so /api/version reflects exactly which commit is running — no override here.
services:
  web:
    image: ${IMAGE:-ghcr.io/martinkadauke/syrus-ai-dev:latest}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      # Demo-form email via Strato SMTP. Only SMTP_PASS (GitHub secret) and
      # DEMO_NOTIFY (GitHub variable, comma-separated recipients) are required;
      # the rest default to the contact@ mailbox. Until set, the form falls back
      # to a mailto so nothing breaks.
      SMTP_HOST: "${SMTP_HOST:-smtp.strato.de}"
      SMTP_PORT: "${SMTP_PORT:-465}"
      SMTP_USER: "${SMTP_USER:-contact@syrus-ai.dev}"
      SMTP_FROM: "${SMTP_FROM:-Syrus <contact@syrus-ai.dev>}"
      SMTP_PASS: "${SMTP_PASS:-}"
      DEMO_NOTIFY: "${DEMO_NOTIFY:-}"
    ports:
      # Host port -> container. NPM points syrus-ai.dev at this host port.
      - "${PUBLIC_PORT:-8770}:3000"
    volumes:
      # Mac .dmg lives here, kept current by the sync-desktop workflow. Mounted
      # into public/ so Next serves it statically at /downloads/<file>.
      - "${DOWNLOADS_DIR:-/srv/syrus/downloads}:/app/public/downloads:ro"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "require('http').get('http://127.0.0.1:3000/api/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"
      interval: 15s
      timeout: 5s
      retries: 4
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
